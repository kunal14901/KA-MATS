# ============================================================
#  KA-MATS — CI Pipeline
#
#  Jobs (in order):
#    lint        → ruff check (style + imports) + ruff format
#    unit-tests  → 504 unit tests, coverage gate >= 60%
#    integration → orchestrator smoke test (no network)
# ============================================================

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: .   # repo root = New_Trading_Architecture/

# ── 1. Lint ──────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: pip install "ruff==0.15.17"

      - name: ruff check (style + imports)
        run: ruff check . --output-format=github

      - name: ruff format (formatting)
        run: ruff format --check .

# ── 2. Unit tests ────────────────────────────────────────────
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage gate (>= 70%)
        env:
          EXECUTION_MODE: paper
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest tests/unit \
            -q \
            --timeout=60 \
            --cov=core --cov=agents --cov=config \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage (3.11 only)
        if: matrix.python-version == '3.11' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

# ── 3. Integration smoke test ────────────────────────────────
  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests (no network, paper mode)
        env:
          EXECUTION_MODE: paper
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest tests/integration \
            -q \
            --timeout=120 \
            --no-cov \
            -m "not requires_network and not requires_api"

