[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Logging
log_cli = false
log_cli_level = WARNING
log_file = logs/test.log
log_file_level = DEBUG

# Coverage
# Gate set to 60% (current: ~62%). 5 agent files have no unit tests yet
# (alt_data_agent, knowledge_agent, thesis_agent, unified_strategy, ws_data_agent).
# Ratchet upward as tests are added; never set above actual coverage.
addopts = 
    --verbose
    --strict-markers
    --cov=core
    --cov=agents
    --cov=config
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=json
    --cov-fail-under=60

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-agent flows
    slow: Tests that take >5 seconds
    requires_network: Tests that need internet access
    requires_api: Tests that need exchange API keys

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
